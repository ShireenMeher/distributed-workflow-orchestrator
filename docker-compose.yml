version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      args:
        SERVICE: api
    environment:
      DATABASE_URL: postgres://orchestrator:orchestrator@postgres:5432/orchestrator?sslmode=disable
      API_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  scheduler:
    build:
      context: .
      args:
        SERVICE: scheduler
    environment:
      DATABASE_URL: postgres://orchestrator:orchestrator@postgres:5432/orchestrator?sslmode=disable
      SCHEDULER_INTERVAL_MS: "1000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  worker:
    build:
      context: .
      args:
        SERVICE: worker
    environment:
      DATABASE_URL: postgres://orchestrator:orchestrator@postgres:5432/orchestrator?sslmode=disable
      WORKER_ID: worker-1
      LEASE_DURATION_SECONDS: "30"
      HEARTBEAT_INTERVAL_SECONDS: "10"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
