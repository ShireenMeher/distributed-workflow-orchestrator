version: "3.9"

# Run with:
#   docker compose -f docker-compose.yml -f load-tests/docker-compose.k6.yml up --scale worker=3

services:
  worker:
    deploy:
      replicas: 3

  k6:
    image: grafana/k6:latest
    profiles: ["load-test"]
    environment:
      BASE_URL: http://api:8080
    volumes:
      - ./load-tests:/scripts
    command: run /scripts/workflow_load.js
    depends_on:
      - api
